name: Generate YouTube Shorts Batch

on:
  workflow_dispatch:
    inputs:
      video_count:
        description: Number of shorts to generate (no maximum)
        required: true
        default: "10"
      topic_direction:
        description: Optional broad direction for AI-generated topics
        required: false
        default: ""
      story_text:
        description: Optional full story text pasted by the user
        required: false
        default: ""
      creator_mode:
        description: Rendering mode for GitHub Actions
        required: true
        default: video
        type: choice
        options:
          - video
      main_video_mode:
        description: Whether to build the main fetched visual track or use attention video only
        required: true
        default: yes-main
        type: choice
        options:
          - yes-main
          - no-main
      upload_to_youtube:
        description: Upload generated videos to YouTube
        required: true
        default: false
        type: boolean
      use_tor_tunnel:
        description: Route API requests through Tor SOCKS5 tunnel
        required: true
        default: true
        type: boolean
      freevoicereader_cookie:
        description: Optional FreeVoiceReader cookie string to override stored secret
        required: false
        default: ""

env:
  PYTHONUNBUFFERED: "1"
  USE_C05_LOCAL_KEYS: "false"
  SHORTS_RUNTIME_MODE: github_actions
  SHORTS_VIDEO_ONLY: "true"
  SHORTS_CREATOR_MODE: video
  SHORTS_ALLOW_LOCAL_DEV: "false"
  SHORTS_MAIN_VIDEO_MODE: ${{ inputs.main_video_mode }}
  SHORTS_SOURCE_STORY: ${{ inputs.story_text }}
  ENABLE_YOUTUBE_UPLOAD: ${{ inputs.upload_to_youtube }}
  ENABLE_TOR_TUNNEL: ${{ inputs.use_tor_tunnel }}
  TOR_PROXY_URL: socks5h://127.0.0.1:9050
  AI_USE_TOR_TUNNEL: "false"
  IMAGE_SEARCH_USE_TOR_TUNNEL: "false"
  VIDEO_FETCH_USE_TOR_TUNNEL: "false"
  AI_PROVIDER: g4f
  AI_PROVIDER_ORDER: g4f
  G4F_MODEL: deepseek-v3.2
  G4F_MODEL_FALLBACKS: deepseek-v3,deepseek-v3-0324,deepseek-chat,deepseek-r1,qwen-2.5-coder,qwen-2.5-72b,qwen-2.5-14b,qwen-2.5,llama-3.3-70b,llama-3.1-8b,gemini-2.0-flash,gemini-2.5-flash,gpt-4o-mini
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
  UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY || secrets.UNSPLASH_ACCESS_KEY || secrets.UNSPLASH_ACCESS_ID }}
  USE_FREEVOICEREADER_TTS: "true"
  FREEVOICEREADER_USE_TOR_TUNNEL: "false"
  FREEVOICEREADER_TTS_VOICE: "en-US-AndrewNeural"
  FREEVOICEREADER_TTS_TIMEOUT: ${{ secrets.FREEVOICEREADER_TTS_TIMEOUT }}
  FREEVOICEREADER_TTS_REQUEST_RETRIES: "4"
  FREEVOICEREADER_TTS_RETRY_BACKOFF_SECONDS: "1.5"
  FREEVOICEREADER_TTS_COOKIE: ${{ inputs.freevoicereader_cookie != '' && inputs.freevoicereader_cookie || secrets.FREEVOICEREADER_TTS_COOKIE }}
  FREEVOICEREADER_TTS_COOKIE_TOKEN: ${{ secrets.FREEVOICEREADER_TTS_COOKIE_TOKEN }}
  FREEVOICEREADER_TTS_COOKIE_NAME: ${{ secrets.FREEVOICEREADER_TTS_COOKIE_NAME }}
  TTS_GENERATION_RETRIES: "3"
  TTS_REGENERATION_PASSES: "2"
  TTS_RETRY_BACKOFF_SECONDS: "1.0"
  SHORTS_TTS_MAX_WORKERS: "4"
  TTS_SPEED_FACTOR: "1.2"
  AUTO_CAPTIONS_FAST_MODE: "true"
  AUTO_CAPTIONS_MAX_CHUNKS: "240"
  AUTO_CAPTIONS_USE_AUDIO_TIMESTAMPS: "true"
  AUTO_CAPTIONS_WHISPER_MODEL: "tiny"
  AUTO_CAPTIONS_WHISPER_DEVICE: "cpu"
  AUTO_CAPTIONS_WHISPER_COMPUTE_TYPE: "int8"
  SHORTS_MEME_EVENT_TARGET_COUNT: "7"
  SHORTS_MEME_DURATION_MIN: "2.0"
  SHORTS_MEME_DURATION_MAX: "2.5"
  SHORTS_SYNTHETIC_STORY_MAX_TOKENS: "5000"
  SHORTS_CONTENT_PACKAGE_MAX_TOKENS: "4000"
  SHORTS_DIRECT_REWRITE_MAX_TOKENS: "2600"
  SHORTS_SHORTEN_REWRITE_MAX_TOKENS: "2200"
  SHORTS_METADATA_REFRESH_MAX_TOKENS: "1800"
  SHORTS_TTS_SEGMENTATION_MAX_TOKENS: "1800"
  SHORTS_MUSIC_DIR: Music
  SHORTS_BRAINROT_DIR: AttentionGrabBrainRotVideos
  SHORTS_GREENSCREEN_DIR: GreenScreenAnimeGirls
  SHORTS_BRAINROT_YES_MAIN_HEIGHT_RATIO: "0.3333"
  RENDER_RESERVED_MEMORY_GB: "1.0"
  RENDER_RESERVED_CPU_CORES: "0"
  RENDER_MEMORY_PER_WORKER_GB: "0.8"

jobs:
  generate-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install and start Tor tunnel
        if: ${{ inputs.use_tor_tunnel }}
        run: |
          sudo apt-get install -y tor netcat-openbsd
          sudo service tor start || sudo systemctl start tor || true
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 9050; then exit 0; fi
            sleep 1
          done
          echo "Tor failed to start"
          exit 1

      - name: Tune render parallelism
        run: |
          cores="$(nproc 2>/dev/null || echo 2)"
          if [ -z "$cores" ] || [ "$cores" -lt 1 ]; then
            cores=2
          fi
          echo "RENDER_WORKER_COUNT=$cores" >> "$GITHUB_ENV"
          echo "RENDER_FFMPEG_THREADS=1" >> "$GITHUB_ENV"

      - name: Prepare YouTube credentials
        if: ${{ inputs.upload_to_youtube }}
        env:
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          set -e
          mkdir -p automation/credentials

          if [ -n "$YOUTUBE_CLIENT_SECRET_JSON" ]; then
            printf '%s' "$YOUTUBE_CLIENT_SECRET_JSON" > automation/credentials/client_secret.json
            echo "YOUTUBE_CLIENT_SECRET_PATH=$GITHUB_WORKSPACE/automation/credentials/client_secret.json" >> "$GITHUB_ENV"
          fi

          if [ -n "$YOUTUBE_TOKEN_PICKLE_B64" ]; then
            token_trimmed="$(printf '%s' "$YOUTUBE_TOKEN_PICKLE_B64" | sed -e 's/^\s*//' -e 's/\s*$//')"
            if printf '%s' "$token_trimmed" | grep -q '^{' ; then
              printf '%s' "$token_trimmed" > automation/credentials/token.json
              echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.json" >> "$GITHUB_ENV"
            elif printf '%s' "$token_trimmed" | base64 --decode > automation/credentials/token.pickle 2>/dev/null; then
              echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.pickle" >> "$GITHUB_ENV"
            else
              printf '%s' "$token_trimmed" > automation/credentials/token.pickle
              echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.pickle" >> "$GITHUB_ENV"
            fi
          elif [ -n "$YOUTUBE_TOKEN_JSON" ]; then
            printf '%s' "$YOUTUBE_TOKEN_JSON" > automation/credentials/token.json
            echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.json" >> "$GITHUB_ENV"
          fi

      - name: Run single-job Actions pipeline
        run: |
          python -m automation.actions_pipeline run-actions-job \
            --count "${{ inputs.video_count }}" \
            --topic-direction "${{ inputs.topic_direction }}" \
            --story-text "${{ inputs.story_text }}" \
            --artifacts-dir "workflow_artifacts" \
            --upload-to-youtube "false" \
            --youtube-privacy public

      - name: Upload final bundles and generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-shorts-${{ github.run_id }}
          path: |
            workflow_artifacts
            workflow_bundles
          if-no-files-found: error

      - name: Upload generated artifacts to YouTube
        if: ${{ inputs.upload_to_youtube }}
        run: |
          python -m automation.upload_artifacts_to_youtube --artifacts-dir workflow_artifacts --privacy public
