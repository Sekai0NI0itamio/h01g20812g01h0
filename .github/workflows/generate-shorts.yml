name: Generate YouTube Shorts Batch

on:
  workflow_dispatch:
    inputs:
      video_count:
        description: Number of shorts to generate (no maximum)
        required: true
        default: "10"
      topic_direction:
        description: Optional broad direction for AI-generated topics
        required: false
        default: ""
      story_text:
        description: Optional full Reddit story text pasted by the user
        required: false
        default: ""
      creator_mode:
        description: Rendering mode
        required: true
        default: auto
        type: choice
        options:
          - auto
          - video
          - image
      upload_to_youtube:
        description: Upload generated videos to YouTube
        required: true
        default: false
        type: boolean
      use_tor_tunnel:
        description: Route API requests through Tor SOCKS5 tunnel
        required: true
        default: true
        type: boolean

jobs:
  generate-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      PYTHONUNBUFFERED: "1"
      USE_C05_LOCAL_KEYS: "false"
      SHORTS_SOURCE_STORY: ${{ inputs.story_text }}
      ENABLE_YOUTUBE_UPLOAD: ${{ inputs.upload_to_youtube }}
      ENABLE_TOR_TUNNEL: ${{ inputs.use_tor_tunnel }}
      TOR_PROXY_URL: socks5h://127.0.0.1:9050
      AI_USE_TOR_TUNNEL: "false"
      IMAGE_SEARCH_USE_TOR_TUNNEL: "false"

      AI_PROVIDER: auto
      SCITELY_API_KEY: ${{ secrets.SCITELY_API_KEY }}
      SCITELY_AUTH_TOKEN: ${{ secrets.SCITELY_AUTH_TOKEN }}
      SCITELY_MODEL: ${{ secrets.SCITELY_MODEL }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}

      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY || secrets.UNSPLASH_ACCESS_KEY || secrets.UNSPLASH_ACCESS_ID }}

      USE_FREEVOICEREADER_TTS: "true"
      FREEVOICEREADER_USE_TOR_TUNNEL: "false"
      FREEVOICEREADER_TTS_VOICE: "en-US-AndrewNeural"
      FREEVOICEREADER_TTS_TIMEOUT: ${{ secrets.FREEVOICEREADER_TTS_TIMEOUT }}
      FREEVOICEREADER_TTS_REQUEST_RETRIES: "4"
      FREEVOICEREADER_TTS_RETRY_BACKOFF_SECONDS: "1.5"
      FREEVOICEREADER_TTS_COOKIE: ${{ secrets.FREEVOICEREADER_TTS_COOKIE }}
      FREEVOICEREADER_TTS_COOKIE_TOKEN: ${{ secrets.FREEVOICEREADER_TTS_COOKIE_TOKEN }}
      FREEVOICEREADER_TTS_COOKIE_NAME: ${{ secrets.FREEVOICEREADER_TTS_COOKIE_NAME }}
      TTS_GENERATION_RETRIES: "3"
      TTS_REGENERATION_PASSES: "2"
      TTS_RETRY_BACKOFF_SECONDS: "1.0"
      SHORTS_TTS_MAX_WORKERS: "4"

      SHORTS_MUSIC_DIR: Music
      SHORTS_BRAINROT_DIR: AttentionGrabBrainRotVideos
      SHORTS_GREENSCREEN_DIR: GreenScreenAnimeGirls
      RENDER_RESERVED_MEMORY_GB: "1.0"
      RENDER_RESERVED_CPU_CORES: "0"
      RENDER_MEMORY_PER_WORKER_GB: "0.8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install and start Tor tunnel
        if: ${{ inputs.use_tor_tunnel }}
        run: |
          sudo apt-get update
          sudo apt-get install -y tor netcat-openbsd
          if nc -z 127.0.0.1 9050; then
            echo "Tor SOCKS proxy already available on 127.0.0.1:9050"
            exit 0
          fi

          sudo service tor start || sudo systemctl start tor || true
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 9050; then
              echo "Tor SOCKS proxy is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Tor failed to start or bind 127.0.0.1:9050"
          sudo service tor status || true
          exit 1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tune render parallelism for runner
        run: |
          cores="$(nproc 2>/dev/null || echo 2)"
          if [ -z "$cores" ] || [ "$cores" -lt 1 ]; then
            cores=2
          fi
          echo "RENDER_WORKER_COUNT=$cores" >> "$GITHUB_ENV"
          echo "RENDER_FFMPEG_THREADS=1" >> "$GITHUB_ENV"
          echo "Render tuning: workers=$cores ffmpeg_threads=1"

      - name: Prepare optional YouTube credentials
        if: ${{ inputs.upload_to_youtube }}
        env:
          YOUTUBE_CLIENT_SECRET_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_PICKLE_B64: ${{ secrets.YOUTUBE_TOKEN_PICKLE_B64 }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          set -e
          mkdir -p automation/credentials

          if [ -n "$YOUTUBE_CLIENT_SECRET_JSON" ]; then
            printf '%s' "$YOUTUBE_CLIENT_SECRET_JSON" > automation/credentials/client_secret.json
            echo "YOUTUBE_CLIENT_SECRET_PATH=$GITHUB_WORKSPACE/automation/credentials/client_secret.json" >> "$GITHUB_ENV"
          fi

          if [ -n "$YOUTUBE_TOKEN_PICKLE_B64" ]; then
            token_trimmed="$(printf '%s' "$YOUTUBE_TOKEN_PICKLE_B64" | sed -e 's/^\s*//' -e 's/\s*$//')"
            if printf '%s' "$token_trimmed" | grep -q '^{' ; then
              printf '%s' "$token_trimmed" > automation/credentials/token.json
              echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.json" >> "$GITHUB_ENV"
            elif printf '%s' "$token_trimmed" | base64 --decode > automation/credentials/token.pickle 2>/dev/null; then
              echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.pickle" >> "$GITHUB_ENV"
            else
              printf '%s' "$token_trimmed" > automation/credentials/token.json
              echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.json" >> "$GITHUB_ENV"
            fi
          elif [ -n "$YOUTUBE_TOKEN_JSON" ]; then
            printf '%s' "$YOUTUBE_TOKEN_JSON" > automation/credentials/token.json
            echo "YOUTUBE_TOKEN_PATH=$GITHUB_WORKSPACE/automation/credentials/token.json" >> "$GITHUB_ENV"
          fi

      - name: Generate shorts sequentially
        run: |
          python -m automation.workflow_batch_runner \
            --count "${{ inputs.video_count }}" \
            --topic-direction "${{ inputs.topic_direction }}" \
            --creator "${{ inputs.creator_mode }}" \
            --upload-to-youtube "${{ inputs.upload_to_youtube }}" \
            --artifacts-dir "workflow_artifacts"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-shorts-${{ github.run_id }}
          path: workflow_artifacts
          if-no-files-found: error
