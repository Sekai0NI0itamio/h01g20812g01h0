name: Create YouTube Short (no upload)

on:
  workflow_dispatch: {}

jobs:
  build-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system packages (ffmpeg, imagemagick)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run GH Action runner (create only)
        env:
          ENABLE_YOUTUBE_UPLOAD: false
          # Optionally provide keys for image generation or fetching
          GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}
          YOUTUBE_CLIENT_JSON_B64: ${{ secrets.YOUTUBE_CLIENT_JSON_B64 }}
        run: |
          python .github/scripts/gh_action_runner.py --upload false
